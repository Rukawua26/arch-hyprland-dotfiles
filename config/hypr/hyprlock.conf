# ────────────────────────────────────────────────────────────
#  Hyprlock — minimal blur with ringed input
# ────────────────────────────────────────────────────────────

general {
    disable_loading_bar = true
    no_fade_in = false
}

background {
    monitor =
    color = rgba(13,13,13,0.96)
}

animations {
    enabled = true
}

input-field {
    monitor =
    size = 620, 84
    position = 0, -20
    halign = center
    valign = center

    inner_color = rgba(17,14,24,0.9)
    outer_color = rgba(0,255,255,0.85)
    outline_thickness = 2

    font_family = JetBrainsMono Nerd Font
    font_size = 28
    font_color = rgba(230,220,255,1.0)

    placeholder_color = rgba(189,147,249,0.7)
    placeholder_text = enter passphrase
    check_color = rgba(0,255,255,1.0)
    fail_text = access denied

    rounding = 14
    shadow_passes = 3
    shadow_color = rgba(189,147,249,0.35)
    fade_on_empty = false
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgba(0,255,255,0.95)
    font_size = 88
    font_family = JetBrainsMono Nerd Font
    position = 0, 120
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A  %d %B')"
    color = rgba(189,147,249,0.9)
    font_size = 24
    font_family = JetBrainsMono Nerd Font
    position = 0, 50
    halign = center
    valign = center
}
